version: '3.8'

services:
  # Node.js Backend Server (Development)
  server:
    build:
      context: .
      dockerfile: Dockerfile.server.dev
    container_name: church_attendance_server_dev
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      AUTH_DEV_BYPASS: 'false'
      PORT: 3001
      CLIENT_URL: http://localhost:3000
      CHURCH_DATA_DIR: /app/data
      JWT_SECRET: your_secure_jwt_secret_change_this_in_production
      JWT_EXPIRE: 30d
      OTC_EXPIRE_MINUTES: 10
      OTC_RESEND_COOLDOWN_SECONDS: 60
      EMAIL_FROM: hello@letmypeoplegrow.com.au
      # Logging controls
      LOG_LEVEL: debug
      CONSOLE_LOG_LEVEL: debug
      HTTP_LOG_MIN_STATUS: 200
      HTTP_LOG_SLOW_MS: 500
      LOG_HTTP_START: 'true'
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./server/uploads:/app/uploads
      - server_data_dev:/app/data
      - ./backups:/backups
    networks:
      - app-network-dev
    command: npm run dev

  # React Frontend Client (Development)
  client:
    build:
      context: .
      dockerfile: Dockerfile.client.dev
      args:
        - VERSION=${VERSION:-0.0.0}
    container_name: church_attendance_client_dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - /app/node_modules
      - ./VERSION:/VERSION:ro
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - PORT=3000
      - FAST_REFRESH=false
      - VITE_HMR=false
      - VITE_USE_WEBSOCKETS=true
      # Version is read from /VERSION mount by vite.config.ts — no env var needed
    depends_on:
      - server
    networks:
      - app-network-dev
    command: npm start

  # Internal Admin Panel (localhost only)
  admin:
    build:
      context: .
      dockerfile: Dockerfile.server.dev
    container_name: church_attendance_admin_dev
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      DOCKER_ENV: "true"
      ADMIN_PORT: 7777
      CHURCH_DATA_DIR: /app/data
    ports:
      - "127.0.0.1:7777:7777"
    volumes:
      - ./server:/app
      - /app/node_modules
      - server_data_dev:/app/data
      - ./backups:/backups
    command: node admin/index.js
    networks:
      - app-network-dev

  # Nginx for API routing (Development)
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx.dev
    container_name: church_attendance_nginx_dev
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx-dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server
    networks:
      - app-network-dev

  # Cloudflare Tunnel - exposes local dev to dev.letmypeoplegrow.com.au
  cloudflared:
    image: cloudflare/cloudflared:latest
    network_mode: "service:nginx"
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token eyJhIjoiYzczNGNkZjcxZmU2ZmQ1NTExYTJmOGEyNDQ3ZWQwM2YiLCJ0IjoiN2Y2YmZiYTctZmE3NS00NmVkLTg1MTktZWQ3YjYzNGE5ODBhIiwicyI6Ik9XUmtPVEk0TmpVdFpUTXpZaTAwTW1Ka0xXSTVZVEl0T1RCbFpEYzNNV1ptTVdObSJ9
    depends_on:
      - nginx
    profiles:
      - tunnel

volumes:
  server_data_dev:

networks:
  app-network-dev:
    driver: bridge
