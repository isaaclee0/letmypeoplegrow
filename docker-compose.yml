version: '3.8'

services:
  # Node.js Backend Server
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: church_attendance_server
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      CHURCH_DATA_DIR: /app/data
      JWT_SECRET: your_secure_jwt_secret_change_this_in_production
      JWT_EXPIRE: 30d
      OTC_EXPIRE_MINUTES: 10
      OTC_RESEND_COOLDOWN_SECONDS: 60
      EMAIL_FROM: hello@letmypeoplegrow.com.au
    ports:
      - "3001:3001"
    volumes:
      - ./server/uploads:/app/uploads
      - server_data:/app/data
    networks:
      - app-network

  # React Frontend Client (also handles API/WebSocket proxying to server)
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: church_attendance_client
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - app-network
      - npm_proxy

  # Internal Admin Panel (localhost only)
  admin:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: church_attendance_admin
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      DOCKER_ENV: "true"
      ADMIN_PORT: 7777
      CHURCH_DATA_DIR: /app/data
    ports:
      - "127.0.0.1:7777:7777"
    command: node admin/index.js
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:7777/api/stats', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    volumes:
      - server_data:/app/data
    networks:
      - app-network

  # NOTE: No separate nginx container needed in production.
  # The client container (nginx:alpine) serves static files AND proxies
  # /api and /socket.io to the server container.
  # Point your external reverse proxy (e.g., Nginx Proxy Manager) directly
  # to the client container on port 3000.
  #
  # NPM configuration:
  #   - Proxy Host: forward your domain to http://church_attendance_client:3000
  #   - Enable "Websockets Support" toggle
  #   - In Advanced tab, add: proxy_read_timeout 86400; proxy_send_timeout 86400;

volumes:
  server_data:

networks:
  app-network:
    driver: bridge
  npm_proxy:
    external: true
